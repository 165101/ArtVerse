              - generic [ref=e231]:
                - heading "能力如何共同构成一个稳定运行的 Agent" [level=2] [ref=e232]
                - paragraph [ref=e233]: 把这些能力合起来看，它们其实分别支撑着”持续稳定”的三根支柱：
                - list [ref=e234]:
                  - listitem [ref=e235]:
                    - paragraph [ref=e236]:
                      - strong [ref=e237]: 身份持续
                      - text: ——
                      - emphasis [ref=e238]: 工作区上下文注入
                      - text: 每轮把人格和知识重新喂给模型；
                      - emphasis [ref=e239]: 双层持久记忆
                      - text: 把对话里有价值的事实沉淀回工作区；
                      - emphasis [ref=e240]: Skill 自动加载
                      - text: 让可复用能力跟着工作区走。于是 agent 的人格和知识不随单次调用结束而消失，而是在工作区里不断累积。
                  - listitem [ref=e241]:
                    - paragraph [ref=e242]:
                      - strong [ref=e243]: 上下文可控
                      - text: ——
                      - emphasis [ref=e244]: 对话压缩
                      - text: 控制深度，
                      - emphasis [ref=e245]: 工具结果卸载
                      - text: 控制宽度，
                      - emphasis [ref=e246]: 溢出恢复
                      - text: 是最后一道兜底。三者合在一起保证在任意长度的会话里，上下文都不会把模型压垮；真的压垮了，也能无感恢复。
                  - listitem [ref=e247]:
                    - paragraph [ref=e248]:
                      - strong [ref=e249]: 状态可恢复
                      - text: ——
                      - emphasis [ref=e250]: 会话持久化
                      - text: 保证进程重启能从断点继续；
                      - emphasis [ref=e251]: RuntimeContext
                      - text: 把当次调用的身份（sessionId/userId）贯穿到所有 hook 和工具；
                      - emphasis [ref=e252]: 可插拔文件系统
                      - text: 让”状态究竟落在哪里”（本地磁盘、沙箱、远端）变成一个配置选择。
                - paragraph [ref=e253]:
                  - text: 这三根支柱之间靠三个共享对象串起来：
                  - code [ref=e254]: WorkspaceManager
                  - text: （谁来读写工作区）、
                  - code [ref=e255]: AbstractFilesystem
                  - text: （工作区落在哪里）、
                  - code [ref=e256]: RuntimeContext
                  - text: （当次调用是谁在说话）。每个 hook 只做自己的事，通过这三个对象和其它 hook 协作——这就是 harness 把一组独立能力合成一个”持续稳定 agent”的方式。
