              - heading "Harness 概览" [level=1] [ref=e83]
              - paragraph [ref=e84]:
                - code [ref=e85]: agentscope-harness
                - text: 在
                - code [ref=e86]: agentscope-core
                - text: 的
                - code [ref=e87]: ReActAgent
                - text: 之上，通过 Hook 和 Toolkit 两个扩展点，装配出一套面向
                - strong [ref=e88]: 长期稳定运行
                - text: 的工程化基础设施。用户入口只有一个类：
                - code [ref=e89]: HarnessAgent
                - text: 。
              - paragraph [ref=e90]:
                - text: 裸的
                - code [ref=e91]: ReActAgent
                - text: 只有”请求-推理-工具-回复”一轮循环。harness 要回答的是另一组问题：
                - strong [ref=e92]: 下一轮怎么办、下一天怎么办、上下文爆了怎么办、状态丢了怎么办、任务太重怎么办
                - text: 。它不替换推理循环，而是在循环的关键时机插入 hook、为模型补上一组基础工具，把这些问题的默认工程答案打包好。
              - generic [ref=e93]:
                - heading "快速开始" [level=2] [ref=e94]
                - paragraph [ref=e95]: 引入依赖：
                - generic [ref=e97]:
                  - generic [ref=e98]: "<dependency> <groupId>io.agentscope</groupId> <artifactId>agentscope-harness</artifactId> <version>${agentscope.version}</version> </dependency>"
                  - button "Copy to clipboard" [ref=e99] [cursor=pointer]:
                    - img "Copy to clipboard" [ref=e100]
                - paragraph [ref=e104]:
                  - text: 下面这个示例演示 harness 的三个核心价值：
                  - strong [ref=e105]: 工作区驱动的人格
                  - text: 、
                  - strong [ref=e106]: 会话持久化
                  - text: （同一
                  - code [ref=e107]: sessionId
                  - text: 的第二轮对话能记得第一轮的内容）、
                  - strong [ref=e108]: 显式启用对话压缩
                  - text: 。第一次运行时会在
                  - code [ref=e109]: "${cwd}/.agentscope/workspace/"
                  - text: 自动生成
                  - code [ref=e110]: AGENTS.md
                  - text: ，之后的运行复用。
                - generic [ref=e112]:
                  - generic [ref=e113]: "public class QuickstartExample { public static void main(String[] args) throws Exception { // 1. 准备工作区：第一次运行生成 AGENTS.md，后续运行复用 Path workspace = Paths.get(\".agentscope/workspace\"); initWorkspaceIfAbsent(workspace); // 2. 构建模型 Model model = DashScopeChatModel.builder() .apiKey(System.getenv(\"DASHSCOPE_API_KEY\")) .modelName(\"qwen-max\") .stream(true) .build(); // 3. 构建 HarnessAgent：工作区注入、会话持久化、追踪日志默认开启； // 这里显式启用对话压缩 HarnessAgent agent = HarnessAgent.builder() .name(\"quickstart-agent\") .sysPrompt(\"你是一个帮助用户做笔记的助手。\") .model(model) .workspace(workspace) .compaction(CompactionConfig.builder() .triggerMessages(30) .keepMessages(10) .flushBeforeCompact(true) // 压缩前把事实提取到日流水账 .build()) .build(); // 4. 同一个 RuntimeContext 发起两轮对话 // sessionId 相同 → 第二轮自动从 Session 恢复第一轮的状态 RuntimeContext ctx = RuntimeContext.builder() .sessionId(\"demo-session\") .userId(\"alice\") .build(); Msg turn1 = agent.call( Msg.builder().role(MsgRole.USER) .textContent(\"我叫天宇,今天准备一个关于 ReAct 的技术分享。\") .build(), ctx).block(); System.out.println(\"[turn1] \" + turn1.getTextContent()); Msg turn2 = agent.call( Msg.builder().role(MsgRole.USER) .textContent(\"我叫什么?我今天要干什么?\") .build(), ctx).block(); System.out.println(\"[turn2] \" + turn2.getTextContent()); } private static void initWorkspaceIfAbsent(Path workspace) throws Exception { Files.createDirectories(workspace); Path agentsMd = workspace.resolve(\"AGENTS.md\"); if (Files.exists(agentsMd)) return; Files.writeString(agentsMd, \"\"\" # 笔记助手 你是一个帮助用户整理笔记和知识的助手。 ## 行为约定 - 主动记录用户提到的关键事实(姓名、计划、偏好等) - 回答用简洁中文,必要时给出要点列表 - 对不确定的内容要主动说明,不要臆造 \"\"\"); } }"
