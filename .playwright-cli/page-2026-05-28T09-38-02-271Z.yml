            - heading "企业级工程范式，开箱即用。" [level=2] [ref=e83]
            - paragraph [ref=e84]: Harness 模块通过 Hook 机制在推理循环之外注入工作区管理、记忆持久化、对话压缩等工程能力，无需修改核心推理逻辑。
            - list [ref=e85]:
              - listitem [ref=e86]: — 结构化工作区作为 Agent 唯一状态来源
              - listitem [ref=e87]: — 跨会话长期记忆沉淀与自动整理
              - listitem [ref=e88]: — 上下文超长自动压缩，防止 Token 溢出
              - listitem [ref=e89]: — 本机磁盘 → Docker 沙箱 → 对象存储，一行切换
            - link "了解 Harness →" [ref=e90] [cursor=pointer]:
              - /url: harness/overview.html
