                        - link "本文摘要：本文深入探讨了进程的基本概念、管理机制及调度算法。进程是程序的执行实例，操作系统通过PCB（进程控制块）管理进程资源。进程状态包括运行、阻塞、挂起等，状态转换本质是PCB在不同队列中的流动。Linux采用写时拷贝技术保证进程独立性，并通过fork创建子进程。进程优先级基于PRI和NI值调整，调度算法采用O(1)策略，使用active和expired双队列避免饥饿问题。文章还分析了僵尸进程、孤儿进程的产生及处理方法，并对比了并行与并发的区别。" [ref=e876] [cursor=pointer]:
