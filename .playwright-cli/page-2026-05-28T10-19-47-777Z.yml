                        - link "本文探讨了Transformer模型的本质简洁性优势，提出了从\"表达能力\"到\"紧凑表达能力\"的理论研究新视角。研究发现，固定精度Transformer在表示某些语言时比LTL、RNN和有限自动机更紧凑：相比LTL和RNN具有指数级优势，相比有限自动机具有双指数级优势。这种优势源于Transformer通过注意力机制能高效模拟双指数级计数器，但代价是验证复杂度更高（EXPSPACE-complete）。研究采用UHAT抽象模型和B-RASP中间语言，展示了Transformer如何利用注意力定位和比较机制压缩" [ref=e935] [cursor=pointer]:
