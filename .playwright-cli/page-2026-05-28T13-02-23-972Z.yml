                  - /url: overview.html
                - text: 从”解决什么问题”入手介绍 harness 的能力。本文换一个视角，
                - strong [ref=e86]: 解释架构本身
                - text: ：为什么这样设计、各层职责是什么、一次
                - code [ref=e87]: call()
                - text: 究竟经历了什么，以及状态如何在系统中流动。
              - separator [ref=e88]
              - generic [ref=e89]:
                - heading "1. 设计理念" [level=2] [ref=e90]
                - paragraph [ref=e91]: 理解 harness 架构需要先理解三个核心决策。
                - generic [ref=e92]:
                  - heading "决策一：薄包装，不替换推理循环" [level=3] [ref=e93]
                  - paragraph [ref=e94]:
                    - code [ref=e95]: HarnessAgent
                    - text: 不是一个新的推理引擎——它只是
                    - code [ref=e96]: ReActAgent
                    - text: 的
                    - strong [ref=e97]: 薄包装
                    - text: ，自身只做两件额外的事：
                  - list [ref=e98]:
                    - listitem [ref=e99]:
                      - paragraph [ref=e100]:
                        - strong [ref=e101]:
                          - code [ref=e102]: bindRuntimeContext(ctx)
                        - text: ：每次
                        - code [ref=e103]: call()
                        - text: 开头，把当次身份（
                        - code [ref=e104]: sessionId
                        - text: 、
                        - code [ref=e105]: userId
                        - text: ）分发给关心它的 hook，并按需从 Session 恢复 Memory 状态；
                    - listitem [ref=e106]:
                      - paragraph [ref=e107]:
                        - strong [ref=e108]:
                          - code [ref=e109]: forceCompactAndRetry
                        - text: ：当模型真的返回 ContextOverflow 错误时，强制压缩并重试一次。
                  - paragraph [ref=e110]:
                    - text: 其余所有能力——工作区注入、记忆管理、会话持久化、子 agent 编排——全部通过 ReActAgent 已有的
                    - strong [ref=e111]: Hook
                    - text: 和
                    - strong [ref=e112]: Toolkit
                    - text: 扩展点注入。这样做的好处是：ReActAgent 的能力完整保留，harness 只叠加，不替换。
                - generic [ref=e113]:
                  - heading "决策二：Hook 驱动，能力正交" [level=3] [ref=e114]
                  - paragraph [ref=e115]:
                    - text: 每个 hook 只做一件事，通过
                    - code [ref=e116]: priority
                    - text: 在同一个事件上排好执行顺序：
                  - list [ref=e117]:
                    - listitem [ref=e118]:
                      - paragraph [ref=e119]:
                        - code [ref=e120]: CompactionHook(10)
                        - text: 在推理前检查是否需要压缩历史；
                    - listitem [ref=e121]:
                      - paragraph [ref=e122]:
                        - code [ref=e123]: SubagentsHook(80)
                        - text: 在推理前注入子 agent 列表；
                    - listitem [ref=e124]:
                      - paragraph [ref=e125]:
                        - code [ref=e126]: WorkspaceContextHook(900)
                        - text: 最后叠加工作区文件——因为它是最终拼进 system prompt 的一层，需要在所有前置处理完成后才运行。
                  - paragraph [ref=e127]:
                    - text: Hook 之间
                    - strong [ref=e128]: 不持有彼此的引用
                    - text: ，只通过三个共享对象通信。每项能力都能独立开关：
                    - code [ref=e129]: compaction
                    - text: 需显式配置，
                    - code [ref=e130]: session persistence
                    - text: 默认开启，
                    - code [ref=e131]: toolResultEviction
                    - text: 按需启用。
                - generic [ref=e132]:
